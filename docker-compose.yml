# Reko — local stack.
#
#   docker compose up -d db    → just Postgres on 127.0.0.1:5432. Pair with
#                                `pnpm dev` for hot-reload development.
#                                THIS is the daily dev path.
#   docker compose up          → Postgres + the production app image on
#                                :3000. Use this to self-host, or to smoke-
#                                test the real prod build locally.
#   docker compose down        → stop everything (database volume kept)
#   docker compose down -v     → stop + WIPE the database volume
#
# Coolify (prod) does NOT read this file — it builds the Dockerfile directly.
#
# Required: a .env with STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET,
# SESSION_SECRET. See .env.example.

services:
  # ── Postgres ─────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reko
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reko_local_dev}
      POSTGRES_DB: reko
    # Bind to localhost only — never expose Postgres to the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - reko_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reko -d reko"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App (production image) ───────────────────────────────────────────
  # Builds the same Dockerfile prod runs. Its start command pushes the
  # schema (drizzle-kit push) then serves — so migrations happen HERE, once,
  # and nowhere else. Only started by a bare `docker compose up`;
  # `docker compose up -d db` leaves it out.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Inside the compose network Postgres is the "db" service. This
      # overrides any DATABASE_URL from .env (which points at localhost,
      # only reachable from the host).
      DATABASE_URL: postgres://reko:${POSTGRES_PASSWORD:-reko_local_dev}@db:5432/reko
      PORT: "3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  reko_pgdata:
